---
# Secrets projected two ways simultaneously:
# 1. envFrom in the Deployment exposes every key as an env var, so
#    `${GITHUB_TOKEN}` in the rendered hammurabi.toml resolves.
# 2. The same Secret is mounted as a file volume at
#    /var/run/secrets/hammurabi/<key> so *_file fields work for
#    operators who prefer not to put tokens on the process env.
#
# Both paths are shipped; operators pick which one their config uses.
# Replace every REPLACE_ME value before applying.
apiVersion: v1
kind: Secret
metadata:
  name: hammurabi-secrets
  labels:
    app.kubernetes.io/name: hammurabi
  # Uncomment to survive `kubectl delete -f` / `kubectl delete secret`:
  # annotations:
  #   helm.sh/resource-policy: keep
type: Opaque
stringData:
  github_token: "REPLACE_ME_ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  # Uncomment any that your config uses:
  # discord_bot_token: "REPLACE_ME_discord_bot_token"
  # anthropic_api_key: "REPLACE_ME_sk-ant-api03-xxxxxxxx"
